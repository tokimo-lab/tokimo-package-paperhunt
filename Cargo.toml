[package]
name = "paperhunt"
version = "0.1.0"
edition = "2021"

[dependencies]
clap = { version = "4", features = ["derive"] }
reqwest = { version = "0.12", features = ["blocking", "json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
quick-xml = "0.36"
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1"
colored = "2"
